# workflows/main_orchestrator.yaml

main:
  steps:
    - init_variables:
        assign:
          - project_id: "${project_id}"
          - location: "${location}"
          - dataform_repo: "${dataform_repo_id}"

    # --- ETAPA 1: EXTRAÇÕES (CLOUD RUN) ---
    - run_extractions:
        parallel:
          branches:
            - extract_ga4:
                steps:
                  - check_ga4:
                      switch:
                        - condition: $${${ga4_enable}}
                          next: call_ga4
                      next: skip_ga4
                  - call_ga4:
                      call: http.post
                      args:
                        url: "${url_ext_ga4}"
                        auth:
                          type: OIDC
                      result: res_ga4
                  - skip_ga4:
                      assign:
                        - res_ga4: "Ignorado"

            - extract_meta:
                steps:
                  - check_meta:
                      switch:
                        - condition: $${${meta_enable}}
                          next: call_meta
                      next: skip_meta
                  - call_meta:
                      call: http.post
                      args:
                        url: "${url_ext_meta}"
                        auth:
                          type: OIDC
                      result: res_meta
                  - skip_meta:
                      assign:
                        - res_meta: "Ignorado"

    # --- ETAPA 2: MODELAGEM (DATAFORM) ---
    - run_dataform:
        try:
            steps:
              - create_compilation:
                  call: http.post
                  args:
                    url: $${"https://dataform.googleapis.com/v1beta1/" + dataform_repo + "/compilationResults"}
                    auth:
                      type: OAuth2
                    body:
                      gitCommitish: "main"
                  result: compilation_res
              - create_workflow_invocation:
                  call: http.post
                  args:
                    url: $${"https://dataform.googleapis.com/v1beta1/" + dataform_repo + "/workflowInvocations"}
                    auth:
                      type: OAuth2
                    body:
                      compilationResult: $${compilation_res.body.name}
                  result: invocation_res
              - wait_dataform:
                  call: sys.sleep
                  args:
                    seconds: 60 # Aguarda o processamento das queries
        retry:
          predicate: $${http.default_retry_predicate}
          max_retries: 3
          backoff:
            initial_delay: 10
            max_delay: 60
            multiplier: 2

    - finish_success:
        return: "Pipeline executado com sucesso."

# --- GESTÃO DE ERROS GLOBAL ---
onError:
  steps:
    - handle_error:
        call: http.post
        args:
          url: "${url_alert}"
          auth:
            type: OIDC
          body:
            error_message: $${last_error.message}
            step: $${last_error.tags[0]}
            execution_id: $${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}
    - fail_execution:
        raise: $${last_error}
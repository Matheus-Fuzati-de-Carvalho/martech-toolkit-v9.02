name: 'MarTech Toolkit Deploy'

on:
  push:
    branches: [ "main" ]
  # Permite rodar manualmente e escolher as flags
  workflow_dispatch:
    inputs:
      enable_ga4:
        description: 'Ativar extração GA4?'
        default: 'true'
        type: choice
        options: ['true', 'false']
      enable_meta_ads:
        description: 'Ativar extração Meta Ads?'
        default: 'true'
        type: choice
        options: ['true', 'false']
      enable_google_ads:
        description: 'Ativar extração Google Ads?'
        default: 'true'
        type: choice
        options: ['true', 'false']
      cron_schedule:
        description: 'Horário do Scheduler (Cron)'
        default: '0 5 * * *'
        type: string

jobs:
  terraform:
    name: 'Terraform Deploy'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Terraform Apply
      working-directory: ./terraform
      run: |
        # Usamos uma lógica para pegar ou o input manual ou o valor padrão do repositório
        terraform apply -auto-approve \
          -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
          -var="enable_ga4=${{ github.event.inputs.enable_ga4 || vars.ENABLE_GA4 }}" \
          -var="enable_meta_ads=${{ github.event.inputs.enable_meta_ads || vars.ENABLE_META_ADS }}" \
          -var="enable_google_ads=${{ github.event.inputs.enable_google_ads || vars.ENABLE_GOOGLE_ADS }}" \
          -var="enable_error_alert=${{ vars.ENABLE_ERROR_ALERT }}" \
          -var="cron_schedule=${{ github.event.inputs.cron_schedule || vars.CRON_SCHEDULE }}"